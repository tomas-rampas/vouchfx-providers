name: Intent to Submit for Verified Tier
description: Signal your intent to seek Verified-tier endorsement
title: "[Verified proposal] [Your Provider Name]"
labels:
  - verified-proposal
body:
  - type: markdown
    attributes:
      value: |
        # Verified-Tier Submission Intent

        Use this form to signal your intent to submit for **Verified-tier** platform-team endorsement.

        This is optional but strongly recommended:
        - It lets maintainers know you plan to submit and coordinate review timing
        - You get early feedback on your readiness
        - The maintainers can help if you have questions

        After signalling intent, prepare your submission according to [`CONTRIBUTING.md`](../CONTRIBUTING.md) and [`VERIFIED_TIER_CHECKLIST.md`](../VERIFIED_TIER_CHECKLIST.md), then open a PR to the `verified/` folder.

  - type: input
    id: provider-name
    attributes:
      label: Provider Name
      description: Human-readable name
      placeholder: "Snowflake Assertion"
    validations:
      required: true

  - type: input
    id: repository-url
    attributes:
      label: Provider Repository URL
      description: Link to your provider repository where the maintainers can review the code
      placeholder: "https://github.com/myorg/vouchfx-snowflake-provider"
    validations:
      required: true

  - type: textarea
    id: rubric-status
    attributes:
      label: Verified-Tier Rubric Status
      description: |
        Briefly describe which rubric items your provider already meets and which you are working on.

        The six rubric items are:
        1. Integration-test fixture passes on the official matrix (engine main + 2 preceding minors)
        2. README with ≥3 use cases and known-limitations section
        3. Security sign-off (credentials, transitive CVEs, TLS, no telemetry, signature)
        4. Apache-2.0 + DCO sign-off
        5. MinEngineVersion declared
        6. CSX reviewed for §13.3.1 conformance

        Example: "We have 1, 2, 4, 5 complete. We are working on 3 (security review) and will add comprehensive integration tests for 1 by [date]."
      placeholder: "We have items 1, 2, 4, 5 done. Working on security review (item 3)."
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: Estimated Timeline
      description: When do you expect to have your provider ready for submission? (optional)
      placeholder: "We estimate ~2 weeks for security review and Docker integration tests."

  - type: textarea
    id: questions
    attributes:
      label: Questions or Blockers
      description: Any questions about the rubric or blockers we should know about? (optional)
      placeholder: "We are unsure about the CSX §13.3.1 review process — can a maintainer clarify?"

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      description: Please confirm
      options:
        - label: I have read the [`VERIFIED_TIER_CHECKLIST.md`](../VERIFIED_TIER_CHECKLIST.md) and understand what is required
          required: true
        - label: I have read the engine's [`CONTRIBUTING.md`](https://github.com/tomas-rampas/vouchfx/blob/main/CONTRIBUTING.md) and the provider authoring guide
          required: true
