# .github/ISSUE_TEMPLATE/config.yml
#
# Disables blank issue creation and provides redirect links so contributors
# can easily find the correct destination for off-topic traffic without
# having to search for it.
#
# Engine bugs, feature requests, and general questions all belong in the
# main engine repository at https://github.com/tomas-rampas/vouchfx.
# This repository only accepts community provider listings (provider-listing.yml)
# and Vouched badge requests (vouched-request.yml).

blank_issues_enabled: false

contact_links:
  - name: Engine bug report or defect
    url: https://github.com/tomas-rampas/vouchfx/issues/new/choose
    about: >
      Report a bug in the vouchfx engine, compiler, orchestration layer,
      or any of the built-in Core providers.

  - name: Engine feature request
    url: https://github.com/tomas-rampas/vouchfx/issues/new/choose
    about: >
      Request a new engine feature, DSL capability, or Core provider improvement.

  - name: Questions and community discussion
    url: https://github.com/tomas-rampas/vouchfx/discussions
    about: >
      Ask questions about writing providers, the YAML DSL, orchestration,
      or anything else vouchfx-related.
