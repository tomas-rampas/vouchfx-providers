# .github/workflows/conformance.yml — build, format, and conformance gate
#
# Triggers: push and pull_request to main.
#
# NOTE ON SDK BOOTSTRAP
# ---------------------
# Platform.Sdk and Platform.Sdk.Testing v1.0.0 are not yet published to nuget.org
# (they ship with the vouchfx v1.0 engine release — S12-D-01).  Until that
# release, this workflow checks out the engine repo alongside and packs only the
# five SDK-closure projects individually into packages-local/ so the providers
# solution can restore and build.  Aspire AppHost projects are deliberately
# excluded — building them would require the Aspire workload.
#
# Once Platform.Sdk 1.0.0 is published to nuget.org the two steps labelled
# "REMOVE AFTER SDK PUBLISHED" can be deleted and restore will come straight
# from nuget.org.
#
# NOTE ON VERSION MATRIX
# ----------------------
# This workflow runs against the engine main SDK only.  The Vouched badge rubric's
# multi-version conformance matrix (a provider's integration-test fixture passing
# on the engine main branch plus the two preceding minor releases) is validated by
# a maintainer at badge-review time, not by this workflow — it is not automated
# here and no fake matrix is added.

name: Conformance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  conformance:
    name: Build, format, and conformance tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── Step 1: Checkout this repo (vouchfx-providers) ───────────────────────
      - name: Checkout vouchfx-providers
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Step 2: Checkout the engine into engine/ [REMOVE AFTER SDK PUBLISHED] ─
      # Provides the SDK-closure source projects so they can be packed below.
      # ref is pinned to a specific commit SHA rather than the moving `main` ref
      # so that a force-push or compromised commit on the engine repo cannot
      # silently alter what gets packed into the community-provider CI job.
      # Update this SHA when pulling in a new engine release; once the engine
      # publishes v1.0 to nuget.org this entire step is removed (see note above).
      - name: Checkout engine (tomas-rampas/vouchfx → engine/)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: tomas-rampas/vouchfx
          # Full 40-char SHA required: actions/checkout treats a short SHA as a branch/tag
          # glob (refs/heads/<ref>*) and fails the cross-repo fetch. This is engine main =
          # f5bf109 (Sprint 12: 18 Core providers + SUT env-configuration surface); track the engine release tag once v1.0 is tagged.
          # Repinned 2026-07-06: the engine repo's main branch history was rewritten
          # (de-published internal plan/ + docs/reviews/ material, redacted a few commit
          # messages) and force-pushed, orphaning the previous SHA. The old and new SHAs
          # point at the same logical commit — same author, timestamp, message, and an
          # identical src/ subtree (git rev-parse <sha>:src is unchanged) — only non-code
          # paths (plan/, docs/reviews/, docs/03_MVP_Project_Plan.md) differ. See the
          # engine-sha-repin PR for the full verification.
          ref: f5bf109651bd5ea4c2f3653d4a62d34fe2ba1011
          path: engine

      # ── Step 3: Set up .NET SDK (version from global.json: 8.0.400) ──────────
      - name: Set up .NET SDK (reads global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json

      # ── Step 4: Pack SDK-closure projects into packages-local/ ───────────────
      # [REMOVE AFTER SDK PUBLISHED]
      #
      # Packs exactly five projects — the minimal closure the template provider
      # and tests depend on.  Order follows the dependency graph (Abstractions
      # first) to keep each pack's implicit restore efficient.  Aspire AppHost
      # projects are intentionally excluded: they embed the DCP binary path at
      # build time and require the Aspire workload, neither of which belongs in
      # a community-provider CI job.
      - name: Pack SDK-closure projects into packages-local/
        run: |
          set -euo pipefail
          for csproj in \
            engine/src/Engine/Platform.Engine.Abstractions/Platform.Engine.Abstractions.csproj \
            engine/src/Engine/Platform.Engine.Authoring/Platform.Engine.Authoring.csproj \
            engine/src/Engine/Platform.Engine.Compilation/Platform.Engine.Compilation.csproj \
            engine/src/Sdk/Platform.Sdk/Platform.Sdk.csproj \
            engine/src/Sdk/Platform.Sdk.Testing/Platform.Sdk.Testing.csproj ; do
            echo "::group::pack $csproj"
            dotnet pack "$csproj" -c Release -o packages-local/ --nologo
            echo "::endgroup::"
          done
          echo "Packages staged in packages-local/:"
          ls packages-local/*.nupkg

      # ── Restore (providers solution, now that local feed is populated) ────────
      - name: Restore dependencies
        run: dotnet restore vouchfx-providers.sln

      # ── Step 5: Build (0-warning gate) ───────────────────────────────────────
      # TreatWarningsAsErrors is enforced by Directory.Build.props; -warnaserror
      # is added here as belt-and-suspenders per the CI contract.
      - name: Build (Release, 0-warning gate)
        run: dotnet build vouchfx-providers.sln -c Release --no-restore -warnaserror

      # ── Step 6: Format gate ───────────────────────────────────────────────────
      - name: Format gate (dotnet format --verify-no-changes)
        run: dotnet format vouchfx-providers.sln --verify-no-changes --no-restore

      # ── Step 7a: Template provider conformance test (always required) ─────────
      # Community.Steps.Hello.Tests contains the ProviderTestHarness conformance
      # test — the canonical gate every provider must pass.
      - name: Test — template provider conformance
        run: >
          dotnet test template/Community.Steps.Hello.Tests
          -c Release
          --no-build
          --logger "console;verbosity=normal"

      # ── Step 7b: Community provider tests (shell-glob over community/) ───────
      # community/ is now the only hosted-source lane — any contributor may PR a
      # provider in (see CONTRIBUTING.md); rpc.json-rpc is the first and doubles
      # as the guide's reference implementation. Every
      # community/**/*.Tests.csproj is discovered and run in its OWN
      # restore/build/test (no --no-build, no sln-membership requirement): a
      # submission that breaks can only fail its own step output, and the
      # packages-local feed (nuget.config) resolves the SDK closure standalone.
      # At least one project must be found — rpc.json-rpc always exists, so an
      # empty glob means the checkout/glob itself is broken, not "no submissions".
      - name: Test — community providers (glob over community/)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          found=0
          for csproj in community/**/*.Tests.csproj; do
            echo "::group::Running community test project: $csproj"
            dotnet test "$csproj" -c Release --logger "console;verbosity=normal"
            echo "::endgroup::"
            found=1
          done
          if [[ "$found" -eq 0 ]]; then
            echo "::error::No community/**/*.Tests.csproj found — rpc.json-rpc should always be present."
            exit 1
          fi

      # ── Step 7b1: Pack gate — every hub provider must produce a valid package ─
      # publish-provider.yml (the separate tag-triggered NuGet publish workflow)
      # assumes every community/<Name>/<Name>.csproj packs cleanly with real,
      # conformant metadata — it does not re-derive or re-check any of this at
      # publish time beyond running the same `dotnet pack`. This step is what
      # actually protects that assumption on every push/PR, well before a
      # maintainer ever cuts a publish tag: it packs each provider exactly as
      # the publish workflow will (Release, no -p:Version — this gate validates
      # metadata, not version) and inspects the resulting .nuspec + package
      # contents for the shape community/Directory.Build.props promises.
      #
      # Discovery mirrors the community-tests glob above: globstar over
      # community/**/*.csproj, filtered by filename suffix (*.Tests.csproj is
      # excluded) rather than by directory-name heuristics — this is robust to
      # a provider folder and its .Tests sibling living side by side (the
      # current rpc.json-rpc layout: community/Community.Steps.JsonRpc/ +
      # community/Community.Steps.JsonRpc.Tests/), and to any deeper nesting.
      - name: Pack gate — every hub provider must produce a valid package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          # validate_nupkg <provider_name> <nupkg-path>
          # Checks one packed provider nupkg against the metadata shape
          # community/Directory.Build.props + the per-provider csproj promise.
          # Emits a named ::error:: per violation; returns non-zero if any
          # check failed so the caller can accumulate failures across every
          # provider before exiting (one bad provider must not hide a second).
          validate_nupkg() {
            local provider_name="$1"
            local nupkg="$2"
            local failed=0

            local nuspec_path="${provider_name}.nuspec"
            local nuspec_content
            nuspec_content="$(unzip -p "$nupkg" "$nuspec_path" 2>/dev/null || true)"
            if [[ -z "$nuspec_content" ]]; then
              echo "::error::$nupkg — could not read $nuspec_path from the package (nuspec missing or misnamed)."
              return 1
            fi

            # -Z1 (zipinfo, names only) gives exact archive entry paths, one
            # per line — no Length/Date/Time columns or header/footer rows to
            # accidentally substring-match against (unlike `unzip -l`).
            local zip_listing
            zip_listing="$(unzip -Z1 "$nupkg")"

            # <license type="expression">Apache-2.0</license> — exact form (not
            # a licenseUrl-only or file-based license).
            if ! grep -qF '<license type="expression">Apache-2.0</license>' <<<"$nuspec_content"; then
              echo "::error::$nupkg — missing or non-conforming <license type=\"expression\">Apache-2.0</license>."
              failed=1
            fi

            # <readme> element AND the file it names actually present at that
            # EXACT path in the package. Anchored to the package-root path
            # (grep -x, whole-line match against the -Z1 entry list) rather
            # than an unanchored substring match, which could be satisfied by
            # an unrelated entry that merely contains the readme filename
            # somewhere in a longer path.
            local readme_file
            readme_file="$(grep -oP '(?<=<readme>)[^<]+(?=</readme>)' <<<"$nuspec_content" || true)"
            if [[ -z "$readme_file" ]]; then
              echo "::error::$nupkg — missing <readme> element in the nuspec."
              failed=1
            elif ! grep -qxF "$readme_file" <<<"$zip_listing"; then
              echo "::error::$nupkg — <readme>$readme_file</readme> is declared but that exact path is not present at the package root in the archive."
              failed=1
            fi

            # Non-empty <description>.
            local description
            description="$(grep -oP '(?<=<description>).*(?=</description>)' <<<"$nuspec_content" || true)"
            if [[ -z "$description" ]]; then
              echo "::error::$nupkg — <description> is missing or empty."
              failed=1
            fi

            # <repository> pointing at THIS hub repo — not a fork, not the
            # engine repo.
            if ! grep -qE '<repository[^>]*\burl="https://github\.com/tomas-rampas/vouchfx-providers"' <<<"$nuspec_content"; then
              echo "::error::$nupkg — <repository> element missing or its url does not point at https://github.com/tomas-rampas/vouchfx-providers."
              failed=1
            fi

            # Non-empty <tags>.
            local tags
            tags="$(grep -oP '(?<=<tags>).*(?=</tags>)' <<<"$nuspec_content" || true)"
            if [[ -z "$tags" ]]; then
              echo "::error::$nupkg — <tags> is missing or empty."
              failed=1
            fi

            # <id> equal to the provider directory name — publish-provider.yml
            # derives PROVIDER from the tag and looks up
            # community/$PROVIDER/$PROVIDER.csproj directly, so a mismatch here
            # would silently publish a package under the wrong id.
            local pkg_id
            pkg_id="$(grep -oP '(?<=<id>).*(?=</id>)' <<<"$nuspec_content" || true)"
            if [[ "$pkg_id" != "$provider_name" ]]; then
              echo "::error::$nupkg — <id>$pkg_id</id> does not match its provider directory name '$provider_name'."
              failed=1
            fi

            return "$failed"
          }

          mkdir -p artifacts/pack-gate

          declare -a provider_csprojs=()
          for csproj in community/**/*.csproj; do
            case "$(basename "$csproj")" in
              *.Tests.csproj) continue ;;
            esac
            provider_csprojs+=("$csproj")
          done

          if [[ "${#provider_csprojs[@]}" -eq 0 ]]; then
            echo "::error::No provider csproj found under community/ (excluding *.Tests.csproj) — rpc.json-rpc should always be present, so this means the checkout/glob is broken, not 'no providers'."
            exit 1
          fi

          gate_failed=0

          for csproj in "${provider_csprojs[@]}"; do
            provider_name="$(basename "$(dirname "$csproj")")"
            # Each provider packs into its OWN output subdirectory rather than
            # a shared artifacts/pack-gate/ selected by filename-prefix glob
            # (${provider_name}.*.nupkg): a prefix glob can mis-resolve for
            # prefix-related provider names living side by side — selecting
            # for "Foo" would also match a co-located "Foo.Bar.1.0.0.nupkg".
            # A dedicated subdirectory makes the lookup unambiguous regardless
            # of naming overlap.
            provider_out="artifacts/pack-gate/${provider_name}"
            echo "::group::Pack gate — $csproj"

            mkdir -p "$provider_out"
            dotnet pack "$csproj" -c Release -o "$provider_out" --nologo

            # No -p:Version is passed, so the version segment of the produced
            # filename is whatever the csproj resolves to by default — glob it
            # rather than assume 1.0.0. The subdirectory scope above means
            # this glob can only ever match this provider's own package.
            nupkg=""
            for candidate in "$provider_out"/*.nupkg; do
              nupkg="$candidate"
              break
            done

            if [[ -z "$nupkg" || ! -f "$nupkg" ]]; then
              echo "::error::$csproj produced no .nupkg in $provider_out/ — possible IsPackable regression. Every hub-hosted provider must produce a package."
              gate_failed=1
              echo "::endgroup::"
              continue
            fi

            echo "Validating package metadata: $nupkg"
            if ! validate_nupkg "$provider_name" "$nupkg"; then
              gate_failed=1
            fi

            echo "::endgroup::"
          done

          if [[ "$gate_failed" -ne 0 ]]; then
            echo "::error::Pack gate failed — one or more community providers produced an invalid or missing package. See errors above."
            exit 1
          fi

          echo "Pack gate passed for ${#provider_csprojs[@]} provider package(s)."

      # ── Step 7b2: Registry index validation ──────────────────────────────────
      # Every entry in community-providers.json must validate against the
      # registry schema (draft 2020-12) — including the hosting-conditional
      # rule (external entries require a nuget id; hub-hosted entries may omit
      # it). Guards registry PRs and hub-hosted submissions alike.
      - name: Validate — registry index vs schema
        run: >
          npx --yes -p ajv-cli@5 -p ajv-formats@2 ajv validate
          -c ajv-formats --spec=draft2020
          -s registry/community-providers.schema.json
          -d registry/community-providers.json

      # ── Step 7c: Tripwire — vouched badge changes are maintainer-only ───────
      # This is a TRIPWIRE, not a hard gate: `gh pr merge --admin` bypasses
      # required status checks (this one included), so the real control is
      # policy, not CI — NEVER --admin-merge a PR that touches the vouched /
      # vouchedVersion fields. This step's job is to make an out-of-policy
      # change LOUD (a failed required check + an ::error:: annotation) so it
      # can't slip past maintainer eyeballing unnoticed. Pair it with
      # branch-protection code-owner review requiring @tomas-rampas approval
      # on /registry/ paths (see .github/CODEOWNERS) — that is the actual
      # enforcement; this step is the tripwire that fires if that review is
      # ever skipped or bypassed.
      #
      # Scope: the comparison below considers ONLY entries that already carry
      # (or newly carry) endorsement state — vouched:true or a non-empty
      # vouchedVersion. A plain registry submission that adds/edits/removes a
      # non-vouched entry (the repo's normal self-service listing flow, used
      # by non-maintainer authors on every PR) is a no-op for this tripwire
      # and never fires it.
      - name: Tripwire — vouched badge changes are maintainer-only
        if: github.event_name == 'pull_request'
        env:
          # Passed via env, not inlined as ${{ github.actor }} in the script
          # body, so the value is never substituted directly into the shell
          # command text.
          PR_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          # Fetch the base branch explicitly into refs/remotes/origin/<base>.
          # A bare `git fetch origin <ref>` only updates FETCH_HEAD unless the
          # remote's configured fetch refspec happens to already cover that
          # branch — not guaranteed under actions/checkout's shallow/
          # single-branch checkout. The explicit <src>:<dst> refspec forces
          # the remote-tracking ref to exist so `origin/$GITHUB_BASE_REF`
          # below is guaranteed to resolve.
          if ! git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF:refs/remotes/origin/$GITHUB_BASE_REF"; then
            echo "::error::Failed to fetch base ref 'origin/${GITHUB_BASE_REF}' — cannot evaluate the vouched-badge tripwire. This is a FETCH FAILURE, not a detected registry change. Re-run the job; if it persists, investigate the checkout/fetch configuration."
            exit 1
          fi
          if ! git rev-parse --verify --quiet "refs/remotes/origin/${GITHUB_BASE_REF}^{commit}" >/dev/null; then
            echo "::error::origin/${GITHUB_BASE_REF} did not resolve to a commit after fetch — cannot evaluate the vouched-badge tripwire. This is a FETCH/RESOLUTION FAILURE, not a detected registry change. Re-run the job; if it persists, investigate the checkout/fetch configuration."
            exit 1
          fi

          # Normalise stepKindId -> {vouched, vouchedVersion} for a given git
          # ref, keeping ONLY endorsement-bearing entries: vouched == true,
          # or a non-empty vouchedVersion (kept even without vouched:true, so
          # a sneaky "vouchedVersion set but vouched omitted" edit still
          # counts as an endorsement-state change). Entries that are not, and
          # never become, endorsement-bearing are excluded entirely — adding,
          # editing, or renaming a plain (non-vouched) entry is therefore
          # invisible to this map and cannot trip the gate. Tolerates: the
          # registry file not existing at all on that ref (e.g. it's
          # introduced fresh in this PR), and non-JSON/missing content
          # generally.
          extract_vouched_map() {
            local ref="$1"
            local content
            if ! content=$(git show "${ref}:registry/community-providers.json" 2>/dev/null); then
              printf '%s' '{}'
              return 0
            fi
            printf '%s' "$content" | jq -cS '
              if type == "array" then . else [] end
              | map(select(.vouched == true or (.vouchedVersion // "") != "")
                  | {
                      (.stepKindId // "?"): {
                        vouched: (.vouched // false),
                        vouchedVersion: (.vouchedVersion // "")
                      }
                    })
              | add // {}
            ' 2>/dev/null || printf '%s' '{}'
            return 0
          }

          base_map=$(extract_vouched_map "origin/$GITHUB_BASE_REF")
          head_map=$(extract_vouched_map "HEAD")

          echo "Base (${GITHUB_BASE_REF}) endorsement-bearing map: $base_map"
          echo "Head (this PR)          endorsement-bearing map: $head_map"

          if [[ "$base_map" == "$head_map" ]]; then
            echo "No vouched/vouchedVersion changes detected — nothing to gate."
            exit 0
          fi

          # Per-stepKindId diff of what actually changed, for the message.
          changed_entries=$(jq -cn --argjson base "$base_map" --argjson head "$head_map" '
            (($base | keys) + ($head | keys) | unique) as $ids
            | [ $ids[] | select($base[.] != $head[.]) | {
                stepKindId: .,
                base: ($base[.] // {vouched: false, vouchedVersion: ""}),
                head: ($head[.] // {vouched: false, vouchedVersion: ""})
              } ]
          ')

          if [[ "$PR_ACTOR" != "tomas-rampas" ]]; then
            echo "::error::This PR changes the endorsement state ('vouched'/'vouchedVersion') of one or more registry entries: ${changed_entries}. These fields are the endorsement trust surface and may ONLY be set by a maintainer via the badge-award flow — see GOVERNANCE.md (https://github.com/tomas-rampas/vouchfx-providers/blob/main/GOVERNANCE.md#the-vouched-badge) and open a Vouched request issue (https://github.com/tomas-rampas/vouchfx-providers/issues/new?template=vouched-request.yml) instead of editing the registry directly. Do not merge this PR — including via 'gh pr merge --admin' — until the vouched field(s) are reverted or a maintainer takes ownership of the change."
            exit 1
          fi

          echo "::notice::Endorsement-state change detected (${changed_entries}), authored by maintainer ($PR_ACTOR) — allowed to proceed."
