# .github/workflows/pages.yml — vouchfx-providers hub site (GitHub Pages)
#
# Publishes the static landing page in `site/` PLUS the repository's markdown —
# the provider-implementation guide, the contributor documents and the worked
# example README — rendered to styled HTML by `scripts/build_site.py`. The
# markdown files stay the single source of truth; this regenerates their HTML
# on every run, so the published pages never drift.
#
# One-time setup (repository owner): Settings → Pages → Build and deployment →
# Source: "GitHub Actions".

name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'template/**/README.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'GOVERNANCE.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'VOUCHED_CHECKLIST.md'
      - 'registry/README.md'
      - 'community/**/README.md'
      - 'scripts/build_site.py'
      - '.github/workflows/pages.yml'
  # Manual runs (any branch) for previewing before a change reaches main.
  # Ecosystem fan-out: a sibling repo's docs merge triggers a rebuild here so
  # build-time facts re-resolve against the live APIs (fact injection arrives
  # with the H4 retrofit; the rebuild also picks up upstream content changes).
  repository_dispatch:
    types: [ecosystem-docs-updated]
  # Weekly belt-and-braces rebuild (staggered per repo).
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:

# Allow the deploy job to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: python -m pip install markdown pygments

      - name: Build site (landing page + rendered docs)
        run: python scripts/build_site.py _site

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      # The Pages service intermittently rejects a freshly created deployment
      # with "Deployment failed, try again later" (observed on the engine repo
      # 2026-07-05 and 2026-07-06; a retry minutes later succeeds). Absorb that
      # flake with one in-job retry instead of requiring a human re-run.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retrying a rejected deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (retry)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

  # Fan-out: after a successful docs deploy caused by a PUSH, ask the sibling
  # repos to rebuild their sites so their build-time facts refresh. One-hop
  # guard: dispatch-, cron- and manually-triggered runs never re-notify, so a
  # cycle is impossible. Requires the ECOSYSTEM_DISPATCH_TOKEN secret (a
  # fine-grained PAT with Contents read/write on the four vouchfx repos);
  # loud-skips when absent — the weekly cron then covers freshness.
  notify:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch ecosystem-docs-updated to sibling repos
        env:
          TOKEN: ${{ secrets.ECOSYSTEM_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::ECOSYSTEM_DISPATCH_TOKEN is not set - sibling sites will refresh on their weekly crons instead."
            echo "ECOSYSTEM_DISPATCH_TOKEN missing; fan-out skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          for repo in vouchfx vouchfx-samples vouchfx-telemetry-backend; do
            if curl -sfS -X POST               -H "Authorization: Bearer $TOKEN"               -H "Accept: application/vnd.github+json"               "https://api.github.com/repos/$GITHUB_REPOSITORY_OWNER/$repo/dispatches"               -d '{"event_type":"ecosystem-docs-updated"}'; then
              echo "notified $repo" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::failed to notify $repo"
              echo "FAILED to notify $repo" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
